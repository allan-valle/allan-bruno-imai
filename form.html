<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Form</title>
</head>
<body>
    <h2 class="titulo">Cadastrar</h2>
    <div class="formulario">
        <form id="meuformulario">
            <label for=titulo>Nome do filme</label>
            <input type="text" id="titulo" placeholder="Título" required><br>
            <label for="img">Imagem do filme</label>
            <input type="url" id="imagem" placeholder="URL do filme" required><br>
            <label for="paragrafo">Escreva sobre o filme</label>
            <textarea type="text" id="sinopse" placeholder="Sinopse" required></textarea><br>
            <input type="text" id="data" placeholder="Data de lançamento" required><br>
            <input type="text" id="Diretor" placeholder="Diretor" required><br>
            <input type="text" id="imdb" placeholder="IMDb" required><br>
            <input type="text" id="classificacao" placeholder="Classificação" required><br>
        </form>
    </div>
</body>
</html>
